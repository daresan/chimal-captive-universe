<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maya Boy – Curse of the Vulture</title><style>
:root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07170f;color:#fff;font:15px system-ui,sans-serif}.wrap{width:min(100%,1280px);padding:12px}h1{margin:0 0 8px;color:#ffd35a;letter-spacing:.08em;text-align:center;text-shadow:2px 3px #542b16}.stage{position:relative;aspect-ratio:16/9;border:5px solid #69401d;border-radius:8px;overflow:hidden;box-shadow:0 18px 60px #000}canvas{width:100%;height:100%;image-rendering:pixelated;background:#5eb8be}.hud{position:absolute;inset:12px 14px auto;display:flex;justify-content:space-between;pointer-events:none;text-shadow:2px 2px #000;font-weight:800}.panel{background:#102015c9;border:2px solid #d7a944;border-radius:7px;padding:6px 10px}.hearts{color:#ff6258}.help{text-align:center;color:#d7cfad;margin:9px 0 0;font-size:13px}.help b{color:#ffd35a}.banner{position:absolute;inset:35% 15%;display:grid;place-items:center;text-align:center;background:#102015e8;border:3px solid #ffd35a;border-radius:12px;font-size:clamp(20px,4vw,44px);font-weight:900;text-shadow:3px 3px #000;visibility:hidden}.banner small{font-size:14px;color:#d7cfad}</style></head>
<body><main class="wrap"><h1>MAYA BOY · CURSE OF THE VULTURE</h1><div class="stage"><canvas id="game" width="1280" height="720"></canvas><div class="hud"><div class="panel"><span class="hearts" id="hp"></span> · Continues <span id="continues"></span><br><span id="state"></span></div><div class="panel" id="zone"></div></div><div class="banner" id="banner"></div></div><p class="help"><b>A/D</b> Gehen → Halten: Rennen · <b>S</b> Ducken · <b>Q</b> Block · <b>E</b> Angriff/Benutzen · <b>Tab</b> Werfen · <b>Leertaste</b> Springen · Xbox: Stick + A/B/X/Y · <a href="level-editor.html" style="color:#ffd35a">Level-Editor</a></p></main>
<script>
const C=document.querySelector('#game'),X=C.getContext('2d'),W=C.width,H=C.height;X.imageSmoothingEnabled=false;
const ui={hp:document.querySelector('#hp'),continues:document.querySelector('#continues'),state:document.querySelector('#state'),zone:document.querySelector('#zone'),banner:document.querySelector('#banner')};
const sheet=new Image();sheet.src='assets/mempalace_boy_spritesheet.png';
const ROW={IDLE:0,WALK:1,RUN:2,JUMP:3,ATTACK:4,THROW:5,DUCK:6,BLOCK:7,ATTACK_WALK:8,ATTACK_RUN:9,THROW_WALK:10,HIT:11,POWERUP:12,DEATH:13};
let editorLevel=null;try{if(new URLSearchParams(location.search).has('editorLevel'))editorLevel=JSON.parse(localStorage.getItem('mayaGameLevel'))}catch{}
const playerSprite={frameWidth:48,frameHeight:64,frames:6,scale:1,...editorLevel?.sprites?.player};if(playerSprite.src)sheet.src=playerSprite.src;
const defaultEnemySprites={snake:{src:'assets/enemies/snake.png',frameWidth:96,frameHeight:64,frames:6,scale:.7},bat:{src:'assets/enemies/bat.png',frameWidth:96,frameHeight:64,frames:6,scale:.7},cougar:{src:'assets/enemies/cougar.png',frameWidth:128,frameHeight:64,frames:6,scale:.65},priest:{src:'assets/enemies/priest.png',frameWidth:96,frameHeight:96,frames:6,scale:.75},boss:{src:'assets/enemies/boss.png',frameWidth:160,frameHeight:112,frames:6,row:0,idleRow:1,scale:1}};
const enemySprites={};for(const [k,d] of Object.entries(defaultEnemySprites)){let s={...d,...editorLevel?.sprites?.[k]},im=new Image();im.src=s.src;enemySprites[k]={...s,image:im}}
const keys={},pressed={};addEventListener('keydown',e=>{if(['Space','Tab'].includes(e.code))e.preventDefault();if(!keys[e.code])pressed[e.code]=1;keys[e.code]=1;if(e.code==='Enter'&&game.over)restart();});addEventListener('keyup',e=>keys[e.code]=0);
const WORLD=editorLevel?.width||9600,G=2100,GROUND=620,zones=[['Homevillage',0,WORLD*.18],['Dschungel',WORLD*.18,WORLD*.4],['Mountainroad',WORLD*.4,WORLD*.58],['Mountain',WORLD*.58,WORLD*.82],['MountainTop · Boss',WORLD*.82,WORLD]];
const editorPlatforms=editorLevel?.terrain?.filter(o=>!o.type.startsWith('chest_')&&!['finish','boss_arena','vine'].includes(o.type));
const platforms=editorPlatforms?.length?editorPlatforms:[{x:0,y:GROUND,w:5350,h:100},...Array.from({length:15},(_,i)=>({x:5350+i*165,y:GROUND-Math.min(i,10)*48,w:190,h:30})),{x:7000,y:170,w:2600,h:550}];
const bossArena=editorLevel?.terrain?.find(o=>o.type==='boss_arena')||{x:8200,w:1400};
const game={cam:0,time:0,over:false,won:false,score:0,shake:0};
const playerSpawn=editorLevel?.spawns?.find(s=>s.type==='player');
const P={x:playerSpawn?.x??180,y:playerSpawn?.y??GROUND-64,w:38,h:58,vx:0,vy:0,dir:1,on:true,state:'IDLE',frame:0,clock:0,hp:3,continues:3,inv:0,action:0,hold:0,power:{attack:1,throw:1,block:1}};
const enemies=[],shots=[],enemyShots=[],chests=[];
function enemy(type,x,y){let d={snake:[42,28,1],bat:[44,28,1],cougar:[64,38,1],priest:[48,62,2],boss:[112,76,3]}[type];enemies.push({type,x,y,spawnX:x,spawnY:y,base:y,w:d[0],h:d[1],hp:d[2],vx:0,vy:0,dir:-1,t:Math.random()*6,hit:0,dead:false,active:false,onGround:false});}
if(editorLevel){editorLevel.spawns.filter(s=>s.type!=='player').forEach(s=>enemy(s.type,s.x,s.y));editorLevel.terrain.filter(o=>o.type.startsWith('chest_')).forEach(o=>chests.push({x:o.x,y:o.y,w:o.w||44,h:o.h||36,open:false,kind:o.type.slice(6)}))}else{[1850,2750,4350,6100].forEach(x=>enemy('snake',x,GROUND-28));[2350,3300,4700,6800].forEach(x=>enemy('bat',x,260));[3900,5100,7250].forEach(x=>enemy('cougar',x,GROUND-38));[3100,5000,6700,7600].forEach(x=>enemy('priest',x,GROUND-62));enemy('boss',8950,165);[900,2100,3800,5850,7470].forEach((x,i)=>chests.push({x,y:i>2?430:GROUND-36,w:44,h:36,open:false,kind:['hp','attack','throw','block','hp'][i]}))}
window.mayaGameDebug={get enemies(){return enemies.map(e=>({type:e.type,active:e.active,dead:e.dead,x:Math.round(e.x),y:Math.round(e.y),dir:e.dir}))},get bossArena(){return bossArena},get player(){return {x:Math.round(P.x),y:Math.round(P.y),hp:P.hp}}};
function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function groundAt(p){let best=9999;for(const q of platforms)if(p.x+p.w>q.x&&p.x<q.x+q.w&&p.y+p.h<=q.y+28&&q.y<best)best=q.y;return best}
function input(){let axis=0,gp=navigator.getGamepads?.()[0];P.padDuck=false;P.padBlock=false;if(gp){axis=Math.abs(gp.axes[0])>.16?gp.axes[0]:0;P.padDuck=gp.axes[1]>.55;pressed.Space||=gp.buttons[0].pressed&&!P.ga;P.padBlock=gp.buttons[1].pressed;pressed.KeyE||=gp.buttons[2].pressed&&!P.gx;pressed.Tab||=gp.buttons[3].pressed&&!P.gy;P.ga=gp.buttons[0].pressed;P.gx=gp.buttons[2].pressed;P.gy=gp.buttons[3].pressed}if(keys.KeyA)axis=-.45;if(keys.KeyD)axis=.45;return axis}
function act(name,t){P.state=name;P.action=t;P.frame=0}function hurt(n=1){if(P.inv||P.state==='BLOCK'&&Math.sign(P.dir)===Math.sign(-P.vx))return;P.hp-=n;P.inv=90;P.vy=-460;act('HIT',28);game.shake=12;if(P.hp<=0)act('DEATH',100)}
function updatePlayer(dt){let axis=input(),moving=Math.abs(axis)>.1;if(moving)P.hold+=dt;else P.hold=0;let run=Math.abs(axis)>.5||P.hold>.62,speed=run?360:205;if(P.state==='DEATH'){P.action-=dt*60;if(P.action<=0){if(P.continues){P.continues--;P.hp=3;P.x=Math.max(100,game.cam+100);P.y=100;P.state='IDLE'}else end(false)}return}if(P.action>0)P.action-=dt*60;
if(pressed.Space&&P.on){P.vy=-750;P.on=false;act('JUMP',12)}if((keys.KeyS||P.padDuck)&&P.on)act('DUCK',4);else if((keys.KeyQ||P.padBlock)&&P.on)act('BLOCK',4);else if(pressed.KeyE){act(moving?(run?'ATTACK_RUN':'ATTACK_WALK'):'ATTACK',24);melee()}else if(pressed.Tab){act(moving?'THROW_WALK':'THROW',28);shots.push({x:P.x+P.w/2,y:P.y+18,w:12,h:12,vx:P.dir*650,vy:-160,life:2})}
if(P.action<=0||['JUMP','DUCK','BLOCK'].includes(P.state)){P.vx=moving?Math.sign(axis)*speed:0;if(moving)P.dir=Math.sign(axis);if(!P.on)P.state='JUMP';else if(keys.KeyS||P.padDuck)P.state='DUCK';else if(keys.KeyQ||P.padBlock)P.state='BLOCK';else P.state=moving?(run?'RUN':'WALK'):'IDLE'}
P.vy+=G*dt;P.x=Math.max(0,Math.min(WORLD-P.w,P.x+P.vx*dt));P.y+=P.vy*dt;let gy=groundAt(P);if(P.y+P.h>=gy&&P.vy>=0){P.y=gy-P.h;P.vy=0;P.on=true}else P.on=false;if(P.y>H+200)hurt(3);P.inv=Math.max(0,P.inv-1);P.clock+=dt*(P.state==='RUN'?14:9);P.frame=Math.floor(P.clock)%6}
function inArena(o){return !bossArena||o.x+o.w/2>=bossArena.x&&o.x+o.w/2<=bossArena.x+bossArena.w}function combatAllowed(e){return e.type!=='boss'||inArena(P)&&inArena(e)}
function melee(){let box={x:P.dir>0?P.x+P.w:P.x-55,y:P.y+5,w:55,h:50};setTimeout(()=>enemies.forEach(e=>{if(!e.dead&&e.active&&combatAllowed(e)&&hit(box,e))damage(e,P.power.attack)}),80)}function damage(e,n=1){e.hp-=n;e.hit=10;if(e.hp<=0){e.dead=true;game.score+=e.type==='boss'?1000:100;if(e.type==='boss')end(true)}}
function supportingPlatform(e,x=e.x,range=28){let foot=e.y+e.h,best=null;for(const p of platforms)if(x+e.w>p.x&&x<p.x+p.w&&p.y>=foot-10&&p.y<=foot+range&&(!best||p.y<best.y))best=p;return best}function snapWalker(e){let best=null;for(const p of platforms)if(e.x+e.w>p.x&&e.x<p.x+p.w&&p.y>=e.y-8&&p.y<=e.y+e.h+64&&(!best||p.y<best.y))best=p;if(best){e.y=best.y-e.h;e.base=e.y;e.onGround=true}else e.dead=true}function blocked(e,nx){return platforms.some(p=>nx+e.w>p.x&&nx<p.x+p.w&&e.y+e.h-7>p.y&&e.y+7<p.y+p.h)}
function walkEnemy(e,speed,dt){let nx=e.x+speed*dt;if(blocked(e,nx)){e.dir*=-1;e.vx=0;return}if(e.vy===0&&!supportingPlatform(e,nx)){e.dead=true;return}e.x=nx;if(e.vy!==0){let oldBottom=e.y+e.h;e.vy+=G*dt;e.y+=e.vy*dt;let p=supportingPlatform(e,e.x,Math.max(30,e.vy*dt+10));if(p&&e.vy>=0&&oldBottom<=p.y+8){e.y=p.y-e.h;e.vy=0;e.onGround=true}else if(e.y>H+80)e.dead=true}else{let p=supportingPlatform(e);if(p)e.y=p.y-e.h}}
function updateEnemies(dt){for(const e of enemies){if(e.dead)continue;if(!e.active){if(e.spawnX>=game.cam&&e.spawnX<=game.cam+W){e.active=true;if(!['bat','boss'].includes(e.type))snapWalker(e)}else continue}if(e.dead)continue;e.t+=dt;e.hit=Math.max(0,e.hit-1);let dx=P.x-e.x,near=Math.abs(dx)<360,dir=Math.sign(dx)||e.dir;if(Math.abs(dx)>24)e.dir=dir;if(e.type==='bat'){e.x-=120*dt;e.y=e.base+Math.sin(e.t*3)*95;if(e.x<game.cam-200)e.dead=true}else if(e.type==='snake'){if(near&&e.vy===0&&Math.sin(e.t*2.1)>.992)e.vy=-430;e.vx=near?e.dir*(e.vy?240:120):e.dir*38;walkEnemy(e,e.vx,dt)}else if(e.type==='cougar'){e.vx=near?e.dir*410:e.dir*250;walkEnemy(e,e.vx,dt)}else if(e.type==='priest'){e.vx=near?e.dir*(Math.sin(e.t*2)>0?110:240):e.dir*45;walkEnemy(e,e.vx,dt);if(near&&Math.sin(e.t*2.4)>.985)enemyShots.push({x:e.x,y:e.y+18,w:13,h:13,vx:e.dir*330,vy:-80,life:3,owner:e})}else{e.vx=Math.abs(dx)>160?e.dir*90:0;e.x=Math.max(bossArena.x,Math.min(bossArena.x+bossArena.w-e.w,e.x+e.vx*dt));e.y=e.base+Math.sin(e.t*2)*42;if(near&&inArena(P)&&Math.sin(e.t*1.7)>.99)enemyShots.push({x:e.x,y:e.y+40,w:22,h:14,vx:e.dir*420,vy:80,life:3,owner:e})}if(hit(P,e)&&P.inv===0&&combatAllowed(e)){if(P.state==='BLOCK'&&P.power.block){e.x-=P.dir*35}else hurt()}}
for(const a of [shots,enemyShots])for(const s of a){s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=260*dt;s.life-=dt}for(const s of shots)for(const e of enemies)if(!e.dead&&e.active&&combatAllowed(e)&&hit(s,e)){damage(e,P.power.throw);s.life=0}for(const s of enemyShots)if((!s.owner||combatAllowed(s.owner))&&hit(s,P)){if(P.state!=='BLOCK')hurt();s.life=0}shots.splice(0,shots.length,...shots.filter(s=>s.life>0));enemyShots.splice(0,enemyShots.length,...enemyShots.filter(s=>s.life>0));}
function updateChests(){for(const c of chests)if(!c.open&&hit(P,c)&&pressed.KeyE){c.open=true;if(c.kind==='hp')P.hp=Math.min(3,P.hp+1);else P.power[c.kind]++;act('POWERUP',55);game.score+=250}}
function drawBackground(){let zone=zones.find(z=>P.x>=z[1]&&P.x<z[2])||zones.at(-1),t=P.x/WORLD;let sky=X.createLinearGradient(0,0,0,H);sky.addColorStop(0,t<.55?'#54b9c3':'#7367a5');sky.addColorStop(1,'#f1c56b');X.fillStyle=sky;X.fillRect(0,0,W,H);X.fillStyle='#d8b45b';X.beginPath();X.arc(1050-game.cam*.02,105,65,0,7);X.fill();layer(.08,'#527b71',440,80);layer(.18,'#315e4d',510,55);layer(.32,'#183f2f',565,35);if(P.x<1500){for(let i=0;i<9;i++)hut(i*240-game.cam*.45,515)}if(P.x>1500&&P.x<5350){for(let i=0;i<24;i++)tree(i*170-game.cam*.55,430,(i%3)*22)}if(P.x>3600){X.fillStyle='#6c6557';for(let i=0;i<8;i++){let x=i*420-game.cam*.28;X.beginPath();X.moveTo(x,590);X.lineTo(x+230,170-(i%2)*70);X.lineTo(x+470,590);X.fill()}}ui.zone.textContent=zone[0]+' · '+Math.round(P.x/WORLD*100)+'%';}
function layer(rate,color,y,amp){X.fillStyle=color;X.beginPath();X.moveTo(0,H);for(let x=0;x<=W;x+=60)X.lineTo(x,y+Math.sin((x+game.cam*rate)/170)*amp);X.lineTo(W,H);X.fill()}function tree(x,y,o){X.fillStyle='#49321c';X.fillRect(x+38,y+60-o,18,150);X.fillStyle='#174c2a';for(let j=0;j<3;j++){X.beginPath();X.arc(x+45+(j-1)*25,y+50-o+j*10,55,0,7);X.fill()}}function hut(x,y){X.fillStyle='#8c5c2e';X.fillRect(x,y,105,75);X.fillStyle='#c89a45';X.beginPath();X.moveTo(x-18,y);X.lineTo(x+53,y-58);X.lineTo(x+123,y);X.fill()}
function drawWorld(){for(const p of platforms){let x=p.x-game.cam;if(x>-p.w&&x<W){X.fillStyle=p.y<300?'#716958':'#5b3b22';X.fillRect(x,p.y,p.w,p.h);X.fillStyle='#587134';X.fillRect(x,p.y,p.w,10)}}for(const c of chests){let x=c.x-game.cam;X.fillStyle=c.open?'#59452c':'#d7a944';X.fillRect(x,c.y,c.w,c.h);X.strokeStyle='#3a2111';X.lineWidth=5;X.strokeRect(x,c.y,c.w,c.h);if(!c.open){X.fillStyle='#fff2a1';X.fillRect(x+19,c.y+15,7,10)}}}
function drawEnemy(e){let x=e.x-game.cam;if(!e.active||x<-180||x>W+180||e.dead)return;let s=enemySprites[e.type];X.save();if(e.hit)X.globalAlpha=.45;if(s?.image.complete&&s.image.naturalWidth){let idle=e.type==='boss'&&Math.abs(e.vx)<1,row=idle?(s.idleRow??1):(s.row||0),frame=Math.floor(e.t*(idle?6:9))%s.frames,dw=s.frameWidth*s.scale,dh=s.frameHeight*s.scale;if(e.dir<0){X.translate(x*2+e.w,0);X.scale(-1,1)}X.drawImage(s.image,frame*s.frameWidth,row*s.frameHeight,s.frameWidth,s.frameHeight,x+(e.w-dw)/2,e.y+e.h-dh,dw,dh)}else{X.fillStyle='#82475e';X.fillRect(x,e.y,e.w,e.h)}X.restore()}
function drawPlayer(){if(P.inv&&Math.floor(P.inv/4)%2)return;let x=Math.round(P.x-game.cam),row=ROW[P.state]??0,s=playerSprite,dw=s.frameWidth*s.scale,dh=s.frameHeight*s.scale;X.save();if(P.dir<0){X.translate(x*2+P.w,0);X.scale(-1,1)}X.drawImage(sheet,(P.frame%s.frames)*s.frameWidth,row*s.frameHeight,s.frameWidth,s.frameHeight,x+(P.w-dw)/2,Math.round(P.y+P.h-dh),dw,dh);X.restore()}
function drawShots(){for(const [arr,col] of [[shots,'#e6d18c'],[enemyShots,'#b62f47']]){X.fillStyle=col;for(const s of arr){X.beginPath();X.arc(s.x-game.cam+s.w/2,s.y+s.h/2,s.w/2,0,7);X.fill()}}}
function end(win){game.over=true;game.won=win;ui.banner.style.visibility='visible';ui.banner.innerHTML=(win?'DER FLUCH IST GEBROCHEN!':'GAME OVER')+'<br><small>Enter drücken für einen Neustart · Score '+game.score+'</small>'}function restart(){location.reload()}
let last=performance.now();function loop(now){let dt=Math.min(.032,(now-last)/1000);last=now;if(!game.over){updatePlayer(dt);updateEnemies(dt);updateChests();game.cam=Math.max(0,Math.min(WORLD-W,P.x-W*.38));game.time+=dt}X.save();if(game.shake){X.translate((Math.random()-.5)*game.shake,(Math.random()-.5)*game.shake);game.shake--}drawBackground();drawWorld();chests;enemies.forEach(drawEnemy);drawShots();drawPlayer();X.restore();ui.hp.textContent='♥'.repeat(Math.max(0,P.hp))+'♡'.repeat(Math.max(0,3-P.hp));ui.continues.textContent=P.continues;ui.state.textContent=P.state+' · '+game.score+' Punkte';C.dataset.enemyState=enemies.map(e=>`${e.type}:${e.active?'active':'waiting'}:${e.dead?'dead':'alive'}:dir${e.dir}:vx${Math.round(e.vx)}`).join(',');for(const k in pressed)delete pressed[k];requestAnimationFrame(loop)}sheet.onload=()=>requestAnimationFrame(loop);
</script></body></html>
